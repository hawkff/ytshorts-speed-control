<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>YT Shorts Speed</title>
    <link rel="stylesheet" href="popup.css" />
  </head>
  <body>
    <header class="header">
      <span class="bolt" aria-hidden="true">&#9889;</span>
      <h1 class="title">Speed</h1>
    </header>

    <p id="status" class="status" role="status" aria-live="polite"></p>

    <div class="current">
      <span id="current-speed" class="current-speed">1x</span>
    </div>

    <div class="slider-row">
      <input
        id="slider"
        class="slider"
        type="range"
        min="0.25"
        max="4"
        step="0.05"
        value="1"
        aria-label="Playback speed"
      />
    </div>

    <div
      id="presets"
      class="presets"
      role="group"
      aria-label="Speed presets"
    ></div>

    <form id="custom-form" class="custom-form" autocomplete="off">
      <label class="custom-label" for="custom-input">Custom</label>
      <input
        id="custom-input"
        class="custom-input"
        type="number"
        min="0.1"
        max="16"
        step="0.05"
        inputmode="decimal"
        placeholder="e.g. 1.75"
        aria-label="Custom playback speed"
      />
      <button id="custom-apply" class="custom-apply" type="submit">Set</button>
    </form>

    <button id="reset" class="reset" type="button">Reset to 1x</button>

    <section class="settings" aria-label="Settings">
      <label class="setting-row" for="enable-on-watch">
        <input id="enable-on-watch" class="setting-checkbox" type="checkbox" />
        <span class="setting-text">
          <span class="setting-title">Also control regular videos</span>
          <span class="setting-desc">
            Apply to normal YT videos, not just Shorts.
          </span>
        </span>
      </label>
    </section>

    <footer class="footer">
      <p class="hint-title">Keyboard shortcuts:</p>
      <ul class="shortcuts">
        <li class="shortcut">
          <kbd>]</kbd>
          <span id="hint-up" class="shortcut-desc"></span>
        </li>
        <li class="shortcut">
          <kbd>[</kbd>
          <span id="hint-down" class="shortcut-desc"></span>
        </li>
        <li class="shortcut">
          <kbd>Backspace</kbd>
          <span id="hint-reset" class="shortcut-desc"></span>
        </li>
        <li class="shortcut">
          <kbd>P</kbd>
          <span class="shortcut-desc">Pause / play</span>
        </li>
      </ul>
    </footer>

    <script src="../lib/speed.js"></script>
    <script src="../lib/settings.js"></script>
    <script src="popup.js"></script>
  </body>
</html>
